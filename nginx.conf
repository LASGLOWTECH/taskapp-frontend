server { listen 80; server_name _; root /usr/share/nginx/html; index index.html; add_header X-Frame-Options SAMEORIGIN always; add_header X-Content-Type-Options nosniff always; add_header X-XSS-Protection 1 mode=block always; add_header Referrer-Policy strict-origin-when-cross-origin always; gzip on; gzip_vary on; gzip_min_length 1024; gzip_types text/plain text/css text/xml application/javascript application/json application/xml+rss text/javascript; location / { try_files \ \/ /index.html; location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ { expires 1y; add_header Cache-Control public; access_log off; } location ~* \.html$ { expires -1; add_header Cache-Control no-cache; } } location /api/ { proxy_pass http://backend:5000/api/; proxy_http_version 1.1; proxy_set_header Host \System.Management.Automation.Internal.Host.InternalHost; proxy_set_header X-Real-IP \; proxy_set_header X-Forwarded-For \; proxy_set_header X-Forwarded-Proto \; proxy_connect_timeout 60s; proxy_send_timeout 60s; proxy_read_timeout 60s; } location /health { access_log off; return 200 frontend-healthy; add_header Content-Type text/plain; } error_page 404 /index.html; error_page 500 502 503 504 /50x.html; location = /50x.html { root /usr/share/nginx/html; } }
