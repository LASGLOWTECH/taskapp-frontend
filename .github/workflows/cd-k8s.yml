name: CD - Deploy Frontend to Kubernetes

on:
  workflow_run:
    workflows: [Frontend CI]
    branches: [main]
    types: [completed]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: taskapp-frontend

jobs:
  deploy:
    name: Build and Deploy to Kubernetes
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == success

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract artifact
        run: tar -xzf frontend.tar.gz && rm frontend.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/taskapp-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Configure kubectl
        run: mkdir -p ~/.kube && echo ${{ secrets.KUBE_CONFIG }} | base64 -d > ~/.kube/config && chmod 600 ~/.kube/config

      - name: Update Kubernetes deployment
        run: kubectl set image deployment/taskapp-frontend taskapp-frontend=ghcr.io/${{ secrets.GHCR_USERNAME }}/taskapp-frontend:latest -n taskapp

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/taskapp-frontend -n taskapp --timeout=5m

      - name: Verify deployment
        run: kubectl get pods -n taskapp -l app=taskapp-frontend