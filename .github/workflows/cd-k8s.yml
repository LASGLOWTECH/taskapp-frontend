name: CD - Deploy Frontend to Kubernetes

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'index.html'
      - '.github/workflows/cd-k8s.yml'

  workflow_dispatch:  # Allows manual triggering

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: taskapp-frontend

jobs:
  deploy:
    name: Build and Deploy to Kubernetes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ secrets.GHCR_USERNAME }}/taskapp-frontend:latest
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: v1.30.0

      - name: Configure kubectl
        run: mkdir -p ~/.kube && echo ${{ secrets.KUBE_CONFIG }} | base64 -d > ~/.kube/config && chmod 600 ~/.kube/config

      - name: Update Kubernetes deployment
        run: kubectl set image deployment/taskapp-frontend taskapp-frontend=ghcr.io/${{ secrets.GHCR_USERNAME }}/taskapp-frontend:latest -n taskapp --insecure-skip-tls-verify

      - name: Wait for rollout to complete
        run: kubectl rollout status deployment/taskapp-frontend -n taskapp --timeout=5m --insecure-skip-tls-verify

      - name: Verify deployment
        run: kubectl get pods -n taskapp -l app=taskapp-frontend --insecure-skip-tls-verify